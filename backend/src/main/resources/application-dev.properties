# H2 Database for local development
spring.datasource.url=jdbc:h2:mem:elderconnect;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Port
server.port=8080

# Same JWT config
elderconnect.app.jwtSecret=elderConnectSecretKeyForLocalDevelopmentOnlyReplaceInProductionWithStrongKey
elderconnect.app.jwtExpirationMs=86400000
