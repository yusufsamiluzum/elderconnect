spring.application.name=elderconnect

# --- MYSQL CONFIGURATION (Real Database) ---
spring.datasource.url=jdbc:mysql://localhost:3306/elderconnect?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- H2 CONFIGURATION (Local/Test Memory Database) ---
# Lütfen MySQL kullanmak istemediğinizde aşağıdaki satırları aktif edin, yukarıdakileri yorum satırı yapın.
# spring.datasource.url=jdbc:h2:mem:elderconnect;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# JWT Configuration
elderconnect.app.jwtSecret=elderConnectSecretKeyForLocalDevelopmentOnlyReplaceInProductionWithStrongKey
elderconnect.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8081
